spring:
  datasource:
    url: ${POSTGRES_URL}
    username: ${POSTGRES_USERNAME}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}

fetcher:
  admin-secret: ${ADMIN_SECRET}
  schedule:
    ordini: "0 0 1 1 2,8 *"        # February 1st and August 1st at 01:00
    iscritti: "0 0 2 1 10 *"       # October 1st at 02:00
    immatricolati: "0 0 2 15 10 *" # October 15th at 02:00
    laureati: "0 0 3 1 11 *"       # November 1st at 03:00
    courses: "0 0 3 1 8 *"
    bandi: "0 0 4 * * *"
    dottorati: "0 0 5 * * *"
    inpa: "0 0 6 * * *"
    epso: "0 0 2 * * 0"
  api:
    inpa-key: ${INPA_API_KEY}
    epso-key: ${EPSO_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  level:
    root: WARN
    org.ohmyopensource: INFO