spring:
  batch:
    job:
      enabled: false
  task:
    scheduling:
      pool:
        size: 1   # IMPORTANT: 0 crashes in Spring Boot 4 — must be at least 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

# Cron expressions set to an impossible date (February 31 never exists)
# to prevent any scheduled job from firing during tests.
fetcher:
  admin-secret: test-secret
  schedule:
    timetables: "0 0 0 31 2 *"
    ordini: "0 0 0 31 2 *"
    iscritti: "0 0 0 31 2 *"
    immatricolati: "0 0 0 31 2 *"
    laureati: "0 0 0 31 2 *"
  mur:
    ckan-base-url: https://dati-ustat.mur.gov.it
    iscritti-dataset-id: iscritti
    immatricolati-dataset-id: immatricolati
    laureati-dataset-id: laureati

logging:
  level:
    org.ohmyopensource: DEBUG
    org.springframework.batch: DEBUG
    org.testcontainers: INFO
    org.flywaydb: DEBUG